<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog & Research | Suraj Tharu Chaudhary</title>
  
  <meta name="theme-color" content="#0f172a">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="/dist/tailwind.css">
  <link rel="stylesheet" href="/style.css">

  <!-- Marked.js for Markdown Parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Highlight.js for Code Blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* Basic markdown prose styling overriding Tailwind resets */
    .prose h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; color: #f8fafc; }
    .prose h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.75rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #e2e8f0; }
    .prose h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #cbd5e1; }
    .prose p { margin-bottom: 1.25rem; line-height: 1.75; color: #94a3b8; }
    .prose em { color: #38bdf8; font-style: normal; font-family: 'Space Mono', monospace; font-size: 0.9rem; }
    .prose strong { color: #f8fafc; font-weight: 600; }
    .prose pre { background: #0f172a; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #1e293b; margin-bottom: 1.5rem; }
    .prose code { font-family: 'Space Mono', monospace; font-size: 0.9rem; }
  </style>
</head>

<body class="dark:text-slate-300 text-slate-800 font-sans antialiased bg-slate-900 overflow-x-hidden selection:bg-brand-500 selection:text-white">
  
  <!-- NAVIGATION -->
  <nav class="fixed top-0 w-full z-50 nav-glass dark:bg-slate-900/70 bg-white/70 border-b dark:border-slate-800 border-slate-200">
    <div class="max-w-4xl mx-auto px-4 flex items-center justify-between h-16">
      <a href="/" class="font-mono font-bold text-lg dark:text-white text-slate-900">&lt;Er.Suraj /&gt;</a>
      <a href="/#research" class="font-mono text-sm text-brand-400 hover:text-brand-300 transition-colors">← Back to Portfolio</a>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <main class="pt-28 pb-20 max-w-4xl mx-auto px-4 min-h-screen">
    
    <!-- Sidebar / Post List (Could be expanded to dynamically list files) -->
    <div class="mb-12 border-b border-slate-800 pb-8">
      <h2 class="text-xs font-mono text-brand-500 tracking-widest uppercase mb-4">Latest Articles</h2>
      <div class="flex gap-4">
        <button onclick="loadPost('hello-world.md')" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-medium text-sm transition-colors border border-slate-700 hover:border-brand-500">
          Why Random Forest is Elite for LULC
        </button>
      </div>
    </div>

    <!-- Render Container -->
    <article id="blog-content" class="prose max-w-none transition-opacity duration-300">
      <div class="animate-pulse">
        <div class="h-10 bg-slate-800 rounded w-3/4 mb-4"></div>
        <div class="h-4 bg-slate-800 rounded w-1/4 mb-8"></div>
        <div class="space-y-3">
          <div class="h-4 bg-slate-800 rounded w-full"></div>
          <div class="h-4 bg-slate-800 rounded w-full"></div>
          <div class="h-4 bg-slate-800 rounded w-5/6"></div>
        </div>
      </div>
    </article>
  </main>

  <script>
    // Initialize marked with highlight.js
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    const contentDiv = document.getElementById('blog-content');

    async function loadPost(filename) {
      contentDiv.style.opacity = 0;
      
      try {
        const response = await fetch(`/blog/posts/${filename}`);
        if (!response.ok) throw new Error('Post not found');
        
        const markdown = await response.text();
        
        setTimeout(() => {
          contentDiv.innerHTML = marked.parse(markdown);
          contentDiv.style.opacity = 1;
        }, 300);
        
      } catch (error) {
        contentDiv.innerHTML = `<h1 class="text-red-400">Error</h1><p>Failed to load the article.</p>`;
        contentDiv.style.opacity = 1;
      }
    }

    // Load default post
    window.addEventListener('load', () => {
      loadPost('hello-world.md');
    });
  </script>
</body>
</html>
