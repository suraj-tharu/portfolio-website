name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Build JS & CSS
      run: npm run build
      
    - name: Run linting
      run: npm run lint
      continue-on-error: true # Ignore lint errors for now if not strictly enforced
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run E2E Tests
      env:
        # Fallback to a dummy URL so Prisma initializes without crashing if the secret is missing
        DATABASE_URL: "${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}"
        GOOGLE_GENERATIVE_AI_API_KEY: "${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY != '' && secrets.GOOGLE_GENERATIVE_AI_API_KEY || 'dummy_key' }}"
      run: npm run test:e2e
